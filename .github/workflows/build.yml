name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build -- --base=./ || npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec.aoo",
            "appName": "PolyGuid",
            "webDir": "dist",
            "server": {
              "url": "https://polyguid.vercel.app",
              "androidScheme": "https",
              "cleartext": true
            }
          }
          EOF
          
          npx cap add android || true
          npx cap sync android

      - name: Setup App Icon (If available)
        run: |
          if [ -f "public/Untitled design.png" ]; then
            npm install -g @capacitor/assets
            # Rename for capacitor-assets
            mkdir -p assets
            cp "public/Untitled design.png" assets/icon.png
            cp "public/Untitled design.png" assets/splash.png || true
            npx capacitor-assets generate --android || true
          fi

      - name: Setup Firebase Google Services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "Google services JSON created successfully."
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret is empty or missing. Build may fail if Push is enabled."
            # Remove plugin if missing to avoid failure
            sed -i 's/apply plugin: "com.google.gms.google-services"//g' android/app/build.gradle || true
          fi

      - name: Build Android APK
        run: |
          cd android
          
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
