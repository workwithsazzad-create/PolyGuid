name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build -- --base=./ || npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi

      - name: Setup Capacitor & Firebase Push Notification
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications
          
          # Capacitor Config Auto Setup with Webview API
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.polyguid.app",
            "appName": "PolyGuid",
            "webDir": "dist",
            "server": {
              "url": "https://polyguid.vercel.app",
              "androidScheme": "https",
              "cleartext": true
            },
            "plugins": {
              "PushNotifications": {
                "presentationOptions": ["badge", "sound", "alert"]
              }
            }
          }
          EOF
          
          npx cap add android || true
          
          # Inject Google Services JSON for Firebase
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          
          npx cap sync android

      - name: Setup App Icon (If available)
        run: |
          npm install @capacitor/assets -D
          # Check if custom icon exists, then generate
          if [ -f "assets/icon.png" ]; then
            npx @capacitor/assets generate --android
          else
            echo "No custom icon found in assets/icon.png. Using default."
          fi

      - name: Build Android APK
        run: |
          cd android
          
          # Fix Kotlin version issue
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PolyGuid-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
